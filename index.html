<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blindagem Energética</title>

<style>
body {
  margin: 0;
  background: #000;
  display: flex;
  justify-content: center;
}

/* CONTAINER */
.container {
  position: relative;
  width: 100%;
  max-width: 500px;
}

/* IMAGEM */
.container img {
  width: 100%;
  height: auto;
  display: block;
}

/* BOTÃO */
.cta {
  position: absolute;

  /* 🔥 POSIÇÃO PROPORCIONAL (MELHOR QUE PIXEL) */
  bottom: 8%;
  left: 50%;
  transform: translateX(-50%);
}

.cta button {
  width: 70%;
  height: 40px;

  background: linear-gradient(90deg, #f6d67a, #e0b24d);
  border: none;
  border-radius: 8px;

  font-size: 16px;
  font-weight: bold;
  color: #000;

  cursor: pointer;
  box-shadow: 0 6px 20px rgba(0,0,0,0.5);

  transition: 0.2s;
}

/* HOVER */
.cta button:hover {
  transform: scale(1.05);
}

/* ========================= */
/* RESPONSIVIDADE */
/* ========================= */

/* TABLET */
@media (min-width: 768px) {
  .container {
    max-width: 700px;
  }

  .cta button {
    height: 45px;
    font-size: 17px;
  }
}

/* PC */
@media (min-width: 1200px) {
  .container {
    max-width: 600px; /* 🔥 reduz tamanho no PC */
  }

  .cta button {
    height: 42px;
    font-size: 16px;
    width: 65%;
  }
}
</style>

</head>

<body>

<div class="container">

  <img src="pagina.png" alt="Blindagem Energética">

  <div class="cta">
    <button onclick="window.location.href='https://pay.kiwify.com.br/XnCMuy1'">
      ATIVE SUA BLINDAGEM AGORA ➤
    </button>
  </div>

</div>

</body>
</html>
