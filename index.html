<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blindagem Energética</title>

<style>

/* RESET */
html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
  min-height: 100dvh; /* 🔥 resolve barra preta no mobile */
  background: #000;
}

/* BODY */
body {
  display: block;
}

/* CONTAINER */
.container {
  position: relative;
  width: 100%;
  max-width: 500px;
  margin: 0 auto;
  min-height: 100dvh; /* 🔥 garante altura total */
}

/* IMAGEM */
.container img {
  width: 100%;
  height: auto;
  display: block;
}

/* CTA */
.cta {
  position: absolute;
  bottom: 6%; /* 🔥 ajuste fino */
  left: 50%;
  transform: translateX(-50%);
  width: 100%;
  display: flex;
  justify-content: center;
}

/* BOTÃO */
.cta button {
  width: 80%;
  max-width: 300px; /* 🔥 evita deformar no desktop */
  height: 44px;

  background: linear-gradient(90deg, #f6d67a, #e0b24d);
  border: none;
  border-radius: 10px;

  font-size: 15px;
  font-weight: bold;
  color: #000;

  cursor: pointer;
  box-shadow: 0 6px 20px rgba(0,0,0,0.5);

  transition: 0.2s;
}

/* HOVER */
.cta button:hover {
  transform: scale(1.05);
}

/* TABLET */
@media (min-width: 768px) {
  .container {
    max-width: 700px;
  }

  .cta button {
    height: 46px;
    font-size: 17px;
  }
}

/* PC */
@media (min-width: 1200px) {
  .container {
    max-width: 600px;
  }

  .cta button {
    height: 44px;
    font-size: 16px;
    width: 65%;
  }
}

</style>
</head>

<body>

<div class="container">

  <img src="pagina.png" alt="Blindagem Energética">

  <div class="cta">
    <button onclick="window.location.href='https://pay.kiwify.com.br/XnCMuy1'">
      ATIVE SUA BLINDAGEM AGORA ➤
    </button>
  </div>

</div>

</body>
</html>
